<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lala Blue</title>
    <meta name="description" content="The Gammon Bag by Lala Blue. Order now. Available in Orange, Navy and Bronze.">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <style>
        .logo-text {
            font-family: var(--serif);
            font-size: 26px;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.07em;
            color: var(--text);
            transition: opacity 0.35s ease;
            white-space: nowrap;
        }
        .logo a {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
        }
        .logo-hover-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 72px;
            width: auto;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }
        .logo a:hover .logo-text      { opacity: 0; }
        .logo a:hover .logo-hover-img { opacity: 1; }

        .hero {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 600px;
            margin-top: var(--header-h);
            overflow: hidden;
            background: #ffffff;
            margin-top: 0;
        }
        .hero-image {
            position: absolute;
            inset: 0;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .hero-content {
            position: absolute;
            bottom: 80px;
            left: 64px;           
            color: var(--text);
            max-width: 520px;
        }
        .newsletter {
            background: #ffffff !important;
            border-top: 1px solid var(--border) !important;
            border-bottom: none !important;
        }
        .newsletter h3                      { color: var(--text) !important; }
        .newsletter p                       { color: var(--muted) !important; }
        .newsletter-form input              { color: var(--text) !important; }
        .newsletter-form input::placeholder { color: var(--muted) !important; }
        .newsletter-form button             { color: var(--text) !important; }
        .newsletter-form { border-bottom-color: var(--border) !important; }

        html, body {
            overscroll-behavior: none;
        }

        #privacy {
            scroll-margin-top: calc(var(--header-h) + 24px);
        }

        @media (max-width: 768px) {
            .hero-content {
                position: absolute;
                bottom: 40px;
                left: 24px;
                right: 24px;
            }
            .hero-content h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

<header class="site-header" id="site-header">
    <div class="header-inner">
        <nav class="nav-left">
            <ul>
                <li><a href="about.html">About</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="logo">
            <a href="index.html" aria-label="Lala Blue">
                <span class="logo-text">Lala Blue</span>
                <img src="assets/images/logo-poster.png" alt="Lala Blue" class="logo-hover-img">
            </a>
        </div>
        <nav class="nav-right">
            <ul><li><a href="shop.html">Shop Now</a></li></ul>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<nav class="mobile-nav" id="mobile-nav">
    <a href="about.html">About</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="hero-image fade-in">
    <img src="assets/images/bronze/front.jpg" alt="The Gammon Bag in Bronze">
</div>

<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <span class="logo-text">Lala Blue</span>
            <p class="footer-tagline">Handcrafted leather goods.</p>
        </div>
        <nav class="footer-nav">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
            <a href="shipping-returns.html">Shipping &amp; Returns</a>
            <a href="shipping-returns.html#privacy">Privacy Policy</a>
        </nav>
        <div class="footer-right">
            <div class="footer-social">
                <a href="https://www.instagram.com/lalablueofficial/" target="_blank" rel="noopener">Instagram</a>
                <a href="https://www.pinterest.com/lalablueofficial/" target="_blank" rel="noopener">Pinterest</a>
            </div>
            <p class="footer-copy">© 2026 Lala Blue. All rights reserved.</p>
        </div>
    </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
